services:
  sentinel:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - SENTINEL_ENV=production
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - sentinel
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      # Override with: GRAFANA_PASSWORD=... docker compose up
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-sentinel123}
    depends_on:
      - prometheus
    restart: unless-stopped
